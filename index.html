        let submitPage = document.getElementById("submitpage")
        let label = document.querySelectorAll("label")
        let mark = document.querySelector(".mark")
        let image = document.getElementById("question image")
        let time = document.getElementById("time");
        let selectTime = document.getElementById("selecttime");

        let calculator = document.querySelector(".calculator")
        let attempt = document.getElementById("attempted")
        let miss = document.getElementById("missed")
        let skip = document.getElementById("skipped")
        let total = document.getElementById("totalquestions")

        let missed = 0
        let skipped = 0

    /* to transition to the selection screen*/
        function start(){
            displayState.style.display = "flex";
            displayState.style.animation ="fadein 0.5s ease"
            subject.style.display = "none";
            backButton1.style.display = "flex";
            backButton1.style.justifyContent = "space-between"
        }
     /* to transition to the exam screen*/
     // functions for the subjects
        function quiz(subject){
            scoreArray = [];
            score = 0;
            currentQuestion = 0
            currentSubject = subject;
            displayState.style.display = "none";
            questionDisplay.style.display ="flex";
            questionDisplay.style.animation ="fadein 0.5s ease"
            backButton1.style.display = "flex"
            backButton1.style.justifyContent = "space-between"
            credits.style.display ="none";
            if(currentSubject[currentQuestion].image){
                image.src = currentSubject[currentQuestion].image
                image.style.display = "block"
                }
            else{
                image.style.display = "none";
            }
            numberQuestion.textContent = "Question " + String(currentQuestion + 1) + "/ " + String(currentSubject.length)
            questionText.textContent = currentSubject[currentQuestion].question
            labels[0].textContent = currentSubject[currentQuestion].options[0]

labels[1].textContent = currentSubject[currentQuestion].options[1]

labels[2].textContent = currentSubject[currentQuestion].options[2]

labels[3].textContent = currentSubject[currentQuestion].options[3]
        }
            
        function submitExam(){
           let submitConfirm = confirm("Are you sure you want to submit?")
           if (submitConfirm){
               questionDisplay.style.display =  "none";
               submitPage.style.display = "flex";
               submitPage.style.flexDirection = "column"
               submitPage.style.alignItems = "center"
               clearInterval(interval);
               score = 0
               for (let x = 0; x < scoreArray.length; x++){
                   if(scoreArray[x] == currentSubject[x].answer){
                   score = score + 1
                   attemptCount = attemptCount + 1
               }
               else if(scoreArray[x] != currentSubject[x].answer && scoreArray[x] != ""){
                   attemptCount = attemptCount + 1 
                   missed = missed + 1 
               }
               else {
                   skipped = skipped + 1
               }
           }
           
           mark.textContent  = score + "/" + currentSubject.length;
           miss.textContent = missed
           attempt.textContent = attemptCount 
           skip.textContent = skipped
           total.textContent = currentSubject.length
        }
    }

            for(let i = 0; i < labels.length; i ++){

              }
          }

        function choose(selected){
                for(let i = 0; i < currentSubject[currentQuestion].options.length; i++){
                    labels[i].style.backgroundColor ="white"
                }
                
                selected.style.backgroundColor = "green"                                
                scoreArray[currentQuestion] = selected.textContent
        }
        function back(){
            submitPage.style.display = "none";
            questionDisplay.style.display = "none";
            displayState.style.display = "flex";
            displayState.style.animation ="fadein 0.5s ease";
            selectTime.style.transform = "translateY(100%)"
                 
         }
        function home(){
            subject.style.display = "flex";
            subject.style.animation ="fadein 0.5s ease"
            displayState.style.display = "none"
              submitPage.style.display = "none";
            questionDisplay.style.display = "none";
            backButton1.style.display = "none";
            selectTime.style.transform = "translateY(100%)"
        }
        function dialogBox(){
        questionDisplay.style.display ="none";
            selectTime.style.display = "flex"
            selectTime.style.transform = "translateY(-50%)"
        }
        function closeDialog(){
        questionDisplay.style.display ="flex";    
            selectTime.style.transform = "translateY(100%)"
        }
        function select(seconds){
            clearInterval(interval)
            timeRemaining = seconds
            time.textContent = String(Math.floor(seconds/60)) + ":" + String(seconds % 60).padStart(2, "0")
            interval = setInterval(updateTime, 1000)
        }
        function updateTime(){
           timeRemaining--
           time.textContent = String(Math.floor(timeRemaining/60)) + ":" + String(timeRemaining % 60).padStart(2, "0")
           if (timeRemaining === 0){
               clearInterval(interval)
               submitExam()
           } 
        }
        function calc(){
            calculator.style.display = "flex"
            calculator.style.animation ="fadein 0.6s ease"
            calculator.style.position = "fixed"
        }
        function closeCalc(){
            calculator.style.display = "none"
        }
